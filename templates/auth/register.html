{% extends "library/layouts/base.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/auth/auth.css') }}">

<div class="auth-container">
    <div class="auth-box">

        <h2>📝 Đăng ký</h2>

        <form id="registerForm">

            <div class="form-group">
                <label>Tên người dùng</label>
                <input type="text" id="username" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" required>
            </div>

            <div class="form-group">
                <label>Nhập lại mật khẩu</label>
                <input type="password" id="confirmPassword" required>
            </div>

            <button type="submit" class="btn-auth">Đăng ký</button>

        </form>

        <p class="auth-link-text">
            Đã có tài khoản?
            <a href="{{ url_for('auth.login_page') }}">Đăng nhập</a>
        </p>

    </div>
</div>

<script src="{{ url_for('static', filename='js/auth/auth.js') }}"></script>

{% endblock %}
