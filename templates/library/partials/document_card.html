<div class="doc-card-horizontal">

    <!-- IMAGE -->
    <div class="doc-thumb">
        <img src="{{ doc.image_url if doc.image_url else '/static/images/pdf.png' }}"
             onerror="this.src='/static/images/pdf.png'">
    </div>

    <!-- CONTENT -->
    <div class="doc-info">

        <!-- TITLE -->
        <a href="/document/{{ doc.id }}" class="doc-title">
            {{ doc.title }}
        </a>

        <!-- TYPE -->
        <div class="doc-type">
            {{ doc.type }}
        </div>

        <!-- AUTHOR -->
        <div class="doc-author">
            {% if doc.authors %}
                Tác giả:
                {% for a in doc.authors %}
                    <span>{{ a }}</span>{% if not loop.last %}, {% endif %}
                {% endfor %}
            {% else %}
                N/A
            {% endif %}
        </div>

        <!-- YEAR -->
        <div class="doc-year">
            📅 {{ doc.year or 'N/A' }}
        </div>

    </div>

</div>
