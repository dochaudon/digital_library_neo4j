<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin/layouts/base_admin.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin/components/pagination.css') }}">

    {% block extra_css %}{% endblock %}
    {% block extra_js %}{% endblock %}
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

    {% include 'admin/partials/header.html' %}

    <div class="admin-container">
        {% include 'admin/partials/sidebar.html' %}

        <main class="admin-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% include 'admin/partials/footer.html' %}

    <!-- JS -->
    <script src="{{ url_for('static', filename='js/admin/layouts/base_admin.js') }}"></script>

</body>
</html>
