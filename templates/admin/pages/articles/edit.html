{% extends 'admin/layouts/base_admin.html' %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin/pages/articles/edit.css') }}">
{% endblock %}

{% block content %}

<div class="form-container">

    <!-- HEADER -->
    <div class="form-header">
        <h2>✏️ Chỉnh sửa bài báo</h2>
        <a href="/admin/articles" class="btn btn-back">← Quay lại</a>
    </div>

    <form method="POST" class="admin-form">

        <div class="form-grid">

            <!-- TITLE -->
            <div class="form-group full">
                <label>Tiêu đề <span class="required">*</span></label>
                <input 
                    name="title" 
                    value="{{ article.title }}" 
                    required
                >
            </div>

            <!-- YEAR -->
            <div class="form-group">
                <label>Năm</label>
                <input 
                    name="year" 
                    type="number"
                    value="{{ article.year }}"
                >
            </div>

            <!-- DOI -->
            <div class="form-group">
                <label>DOI</label>
                <input 
                    name="doi" 
                    value="{{ article.doi }}"
                >
            </div>

            <!-- JOURNAL -->
            <div class="form-group full">
                <label>Tạp chí</label>
                <input 
                    name="journal" 
                    value="{{ article.journal }}"
                >
            </div>

            <!-- FILE URL -->
            <div class="form-group full">
                <label>File URL</label>
                <input 
                    name="file_url" 
                    value="{{ article.file_url or '' }}"
                >
            </div>

            <!-- ABSTRACT -->
            <div class="form-group full">
                <label>Mô tả</label>
                <textarea name="abstract" rows="5">
{{ article.abstract }}
                </textarea>
            </div>

        </div>

        <!-- ACTION -->
        <div class="form-actions">
            <button type="submit" class="btn btn-save">
                💾 Cập nhật
            </button>

            <a href="/admin/articles" class="btn btn-cancel">
                Hủy
            </a>
        </div>

    </form>
</div>

{% endblock %}
