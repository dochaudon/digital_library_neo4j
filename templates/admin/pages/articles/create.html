{% extends 'admin/layouts/base_admin.html' %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin/pages/articles/create.css') }}">
{% endblock %}

{% block content %}

<div class="form-container">

    <!-- HEADER -->
    <div class="form-header">
        <h2>📰 Thêm bài báo</h2>
        <a href="/admin/articles" class="btn btn-back">← Quay lại</a>
    </div>

    <form method="POST" class="admin-form">

        <div class="form-grid">

            <!-- TITLE -->
            <div class="form-group full">
                <label>Tiêu đề <span class="required">*</span></label>
                <input 
                    name="title" 
                    required 
                    autofocus
                    placeholder="Nhập tiêu đề bài báo..."
                >
            </div>

            <!-- YEAR -->
            <div class="form-group">
                <label>Năm</label>
                <input 
                    name="year" 
                    type="number"
                    min="1900"
                    max="2100"
                    placeholder="2024"
                >
            </div>

            <!-- DOI -->
            <div class="form-group">
                <label>DOI</label>
                <input 
                    name="doi"
                    placeholder="10.1000/xyz123"
                >
            </div>

            <!-- JOURNAL -->
            <div class="form-group full">
                <label>Tạp chí</label>
                <input 
                    name="journal"
                    placeholder="Nature, IEEE, Springer..."
                >
            </div>

            <!-- FILE URL -->
            <div class="form-group full">
                <label>File URL</label>
                <input 
                    name="file_url"
                    placeholder="Link PDF..."
                >
            </div>

            <!-- ABSTRACT -->
            <div class="form-group full">
                <label>Mô tả</label>
                <textarea 
                    name="abstract" 
                    rows="5"
                    placeholder="Nhập tóm tắt bài báo..."
                ></textarea>
            </div>

        </div>

        <!-- ACTION -->
        <div class="form-actions">
            <button type="submit" class="btn btn-save">
                💾 Lưu
            </button>

            <a href="/admin/articles" class="btn btn-cancel">
                Hủy
            </a>
        </div>

    </form>
</div>

{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/admin/pages/articles/create.js') }}"></script>
{% endblock %}
