{% extends 'admin/layouts/base_admin.html' %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin/pages/keyword/index.css') }}">
{% endblock %}

{% block content %}
<div class="keyword-container">

    <div class="header">
        <h2>🔑 Keywords</h2>
        <a href="/admin/keywords/create" class="btn-add">➕ Add</a>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="keywordTable"></tbody>
        </table>
    </div>

</div>

<script src="{{ url_for('static', filename='js/admin/pages/keyword.js') }}"></script>
{% endblock %}
